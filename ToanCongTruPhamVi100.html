<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Toán Vui - Thách Thức 100</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            overflow-x: hidden;
            margin: 0;
            user-select: none;
        }

        .star {
            position: fixed;
            color: #fff;
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card-game {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #81c784;
            position: relative;
        }

        .btn-answer {
            transition: all 0.2s;
            border-bottom: 5px solid rgba(0,0,0,0.15);
        }
        
        .btn-answer:active:not(.disabled) {
            transform: translateY(4px);
            border-bottom: 0px solid rgba(0,0,0,0);
            margin-top: 5px;
            margin-bottom: -5px;
        }

        .correct-ans {
            background-color: #4ade80 !important;
            color: white !important;
            border-color: #22c55e !important;
            border-bottom-color: #16a34a !important;
        }

        .wrong-ans {
            background-color: #f87171 !important;
            color: white !important;
            border-color: #ef4444 !important;
            border-bottom-color: #dc2626 !important;
        }

        #feedback-icon {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 60px;
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #feedback-icon.show {
            transform: translate(-50%, -50%) scale(1.2);
        }

        .hidden { display: none !important; }
        .disabled { pointer-events: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #a8e6cf; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #81c784; }

        /* Animation cho dòng cổ vũ xuyên suốt */
        .encouragement-footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 40;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
    <div id="stars-container"></div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="correctSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="wrongSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- Dòng cổ vũ xuất hiện xuyên suốt khi bắt đầu game -->
    <div id="globalEncouragement" class="encouragement-footer hidden">
        <div class="inline-block bg-white/80 backdrop-blur-sm px-6 py-2 rounded-full shadow-lg border-2 border-orange-300 text-orange-600 font-bold text-lg sm:text-xl animate-pulse">
            <span id="globalEncouragementText">Cố lên nhé bé! 💪🌟</span>
        </div>
    </div>

    <div class="max-w-xl w-full z-10 mb-12">
        <div id="welcome-screen" class="card-game p-8 text-center">
            <h1 class="text-4xl font-bold text-green-700 mb-4">🌟 BÉ HỌC TOÁN 🌟</h1>
            <p class="text-lg text-gray-600 mb-6 font-semibold">Thử Thách Phép Toán Cộng Trừ Phạm Vi 100, Nhân 2,5</p>
            
            <div class="mb-6">
                <input type="text" id="studentName" placeholder="Nhập tên của bé..." 
                    class="w-full p-4 rounded-2xl border-2 border-green-300 focus:outline-none focus:border-green-500 text-center text-xl">
            </div>

            <div class="flex flex-col gap-4 max-w-xs mx-auto">
                <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-full text-2xl shadow-lg btn-answer w-full">
                    BẮT ĐẦU CHƠI 🚀
                </button>
                <button onclick="showLeaderboard()" class="bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3 px-8 rounded-full text-xl shadow-lg btn-answer w-full">
                    BẢNG XẾP HẠNG 🏆
                </button>
            </div>
        </div>

        <div id="game-screen" class="card-game p-6 hidden">
            <div id="feedback-icon"></div>
            <div class="flex justify-between items-center mb-6 text-sm sm:text-base">
                <div class="bg-green-100 px-3 sm:px-4 py-2 rounded-full font-bold text-green-700">Câu: <span id="currentQuestionNum">1</span>/20</div>
                <div class="bg-yellow-100 px-3 sm:px-4 py-2 rounded-full font-bold text-yellow-700">⏱️ <span id="timer">00:00</span></div>
                <div class="bg-blue-100 px-3 sm:px-4 py-2 rounded-full font-bold text-blue-700">Điểm: <span id="currentScore">0</span></div>
            </div>
            <div class="text-center mb-8">
                <div id="questionText" class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800 bg-gray-50 p-4 sm:p-6 md:p-8 rounded-3xl border-2 border-dashed border-green-200 min-h-[120px] flex items-center justify-center"></div>
            </div>
            <div id="answersGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="result-screen" class="card-game p-8 text-center hidden">
            <h2 class="text-4xl font-bold text-yellow-600 mb-2">HOÀN THÀNH! 🎉</h2>
            <div id="honoredName" class="text-2xl font-bold text-green-700 mb-4"></div>
            <div class="bg-yellow-50 rounded-3xl p-6 mb-6 border-2 border-yellow-200">
                <div class="text-6xl font-black text-red-500 mb-2"><span id="finalScore">0</span></div>
                <div class="text-gray-600 font-bold text-xl">Số câu đúng: <span id="correctCount">0</span>/20</div>
            </div>
            
            <p id="rankMessage" class="text-green-600 font-bold text-xl italic mb-8"></p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <button onclick="window.location.reload()" class="w-full sm:w-auto bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-xl shadow-lg btn-answer">CHƠI LẠI 🔄</button>
                <button onclick="showLeaderboard()" class="w-full sm:w-auto bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-bold py-3 px-8 rounded-full text-xl shadow-lg btn-answer">XẾP HẠNG 🏆</button>
            </div>
        </div>
    </div>

    <div id="leaderboard-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center hidden">
        <div class="card-game p-6 w-[90%] max-w-md max-h-[85vh] flex flex-col relative bg-white">
            <button onclick="hideLeaderboard()" class="absolute top-2 right-4 text-gray-400 hover:text-gray-600 text-4xl leading-none font-light">&times;</button>
            <h2 class="text-2xl font-bold text-yellow-600 mb-4 text-center mt-2">🏆 BẢNG XẾP HẠNG 🏆</h2>
            <div id="leaderboard-list" class="flex-1 overflow-y-auto pr-2 space-y-3 custom-scrollbar">
                <div class="text-center text-gray-500 py-6 font-semibold animate-pulse">Đang tải dữ liệu...</div>
            </div>
            <button onclick="hideLeaderboard()" class="mt-4 w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-full text-lg btn-answer">Đóng</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'math-game-pro-100';
        let app, auth, db;
        let currentUser = null;
        let leaderboardData = [];
        
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) { console.error("Firebase error:", e); }

        if (auth) {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else { await signInAnonymously(auth); }
            };
            initAuth();
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) listenToLeaderboard();
            });
        }

        function listenToLeaderboard() {
            if (!currentUser || !db) return;
            const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'math_leaderboard');
            onSnapshot(leaderboardRef, (snapshot) => {
                leaderboardData = [];
                snapshot.forEach(doc => leaderboardData.push(doc.data()));
                leaderboardData.sort((a, b) => (b.score - a.score) || ((a.time || 0) - (b.time || 0)));
                updateLeaderboardUI();
            }, (error) => console.error(error));
        }

        async function saveScore(name, score, time) {
            if (!currentUser || !db) return;
            try {
                const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'math_leaderboard');
                await addDoc(leaderboardRef, {
                    name: name || "Ẩn danh",
                    score: Number(score),
                    time: time,
                    userId: currentUser.uid,
                    timestamp: serverTimestamp()
                });
            } catch (error) { console.error(error); }
        }

        function updateLeaderboardUI() {
            const listEl = document.getElementById('leaderboard-list');
            if (!listEl) return;
            if (leaderboardData.length === 0) {
                listEl.innerHTML = '<div class="text-center text-gray-500 py-6">Chưa có dữ liệu.</div>';
                return;
            }
            listEl.innerHTML = '';
            leaderboardData.slice(0, 50).forEach((data, index) => {
                const mins = Math.floor((data.time || 0) / 60).toString().padStart(2, '0');
                const secs = ((data.time || 0) % 60).toString().padStart(2, '0');
                const safeName = (data.name || "Ẩn danh").replace(/</g, "&lt;");
                listEl.innerHTML += `
                    <div class="flex justify-between items-center bg-green-50 p-3 rounded-2xl border border-green-100">
                        <div class="flex items-center gap-3">
                            <span class="font-black w-8 text-center text-green-600">${index + 1}</span>
                            <span class="font-bold text-green-800 truncate max-w-[150px]">${safeName}</span>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-red-500">${data.score} đ</div>
                            <div class="text-xs text-gray-500">⏱️ ${mins}:${secs}</div>
                        </div>
                    </div>
                `;
            });
        }

        window.showLeaderboard = () => document.getElementById('leaderboard-modal').classList.remove('hidden');
        window.hideLeaderboard = () => document.getElementById('leaderboard-modal').classList.add('hidden');

        function generateHard100Questions() {
            const db = { basic: [], word: [] };
            
            // Phép Cộng (Phạm vi 100)
            for (let i = 0; i < 40; i++) {
                let a = Math.floor(Math.random() * 70) + 15; 
                let b = Math.floor(Math.random() * (100 - a - 5)) + 10;
                let ans = a + b;
                db.basic.push({ 
                    q: `${a} + ${b} = ?`, 
                    a: [ans.toString(), (ans + 1).toString(), (ans - 1).toString(), (ans + 10).toString()] 
                });
            }
            
            // Phép Trừ (Phạm vi 100)
            for (let i = 0; i < 40; i++) {
                let a = Math.floor(Math.random() * 80) + 20; 
                let b = Math.floor(Math.random() * (a - 5)) + 5;
                let ans = a - b;
                db.basic.push({ 
                    q: `${a} - ${b} = ?`, 
                    a: [ans.toString(), (ans + 1).toString(), (ans - 1).toString(), (ans + 2).toString()] 
                });
            }
            
            // Phép Nhân 2 & 5
            for (let i = 0; i < 20; i++) {
                let val = Math.floor(Math.random() * 45) + 6;
                let ans = val * 2;
                db.basic.push({ q: `2 × ${val} = ?`, a: [ans.toString(), (ans + 2).toString(), (ans - 2).toString(), (ans + 10).toString()] });
            }
            for (let i = 0; i < 20; i++) {
                let val = Math.floor(Math.random() * 17) + 4;
                let ans = val * 5;
                db.basic.push({ q: `5 × ${val} = ?`, a: [ans.toString(), (ans + 5).toString(), (ans - 5).toString(), (ans + 10).toString()] });
            }

            // Bài toán lời văn
            const names = ["Lan", "An", "Bình", "Hoa", "Minh", "Tuấn", "Linh", "Nam", "Mai", "Hùng"];
            const items = ["viên bi", "quyển vở", "con tem", "bông hoa", "quả cam"];
            
            for (let i = 0; i < 80; i++) {
                let n = names[i % names.length];
                let it = items[i % items.length];
                let type = i % 4;
                if (type === 0) { // Cộng
                    let a = Math.floor(Math.random()*45)+10, b = Math.floor(Math.random()*40)+10;
                    let ans = a + b;
                    db.word.push({ q: `${n} có ${a} ${it}, bạn cho thêm ${b} ${it}. Hỏi ${n} có bao nhiêu ${it}?`, a: [ans.toString(), (ans+1).toString(), (ans-1).toString(), (ans+10).toString()] });
                } else if (type === 1) { // Trừ
                    let a = Math.floor(Math.random()*50)+50, b = Math.floor(Math.random()*(a-10))+5;
                    let ans = a - b;
                    db.word.push({ q: `${n} có ${a} ${it}, ${n} dùng mất ${b} ${it}. Hỏi ${n} còn lại bao nhiêu?`, a: [ans.toString(), (ans+1).toString(), (ans-1).toString(), (ans+2).toString()] });
                } else if (type === 2) { // Nhân 2
                    let a = Math.floor(Math.random()*30)+10;
                    let ans = a * 2;
                    db.word.push({ q: `Có ${a} túi, mỗi túi có 2 ${it}. Hỏi tất cả có bao nhiêu ${it}?`, a: [ans.toString(), (ans+2).toString(), (ans-2).toString(), (ans+10).toString()] });
                } else { // Nhân 5
                    let a = Math.floor(Math.random()*15)+3;
                    let ans = a * 5;
                    db.word.push({ q: `Mỗi hộp có 5 ${it}, bé có ${a} hộp. Hỏi tất cả có bao nhiêu ${it}?`, a: [ans.toString(), (ans+5).toString(), (ans-5).toString(), (ans+10).toString()] });
                }
            }
            return db;
        }

        const KHO_DE = generateHard100Questions();
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let correctCount = 0;
        let timerInterval;
        let totalSeconds = 0;
        let canAnswer = true;

        window.startGame = function() {
            const name = document.getElementById('studentName').value.trim();
            if (!name) { alert("Nhập tên nhé bé!"); return; }
            
            // Kích hoạt dòng cổ vũ xuyên suốt
            const globalEnc = document.getElementById('globalEncouragement');
            globalEnc.classList.remove('hidden');
            document.getElementById('globalEncouragementText').innerText = `Cố lên nhé ${name} 💪🌟`;

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            let q1 = shuffle([...KHO_DE.basic]).slice(0, 12);
            let q2 = shuffle([...KHO_DE.word]).slice(0, 8);
            currentQuestions = shuffle([...q1, ...q2]);
            startTimer();
            showQuestion();
        };

        function showQuestion() {
            canAnswer = true;
            document.getElementById('feedback-icon').classList.remove('show');
            const qData = currentQuestions[currentIndex];
            document.getElementById('currentQuestionNum').innerText = currentIndex + 1;
            document.getElementById('questionText').innerText = qData.q;
            const grid = document.getElementById('answersGrid');
            grid.innerHTML = '';
            const correct = qData.a[0];
            shuffle([...qData.a]).forEach(ans => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-green-700 font-bold py-4 rounded-2xl text-xl shadow border-2 border-green-200 btn-answer w-full";
                btn.innerText = ans;
                btn.onclick = () => {
                    if (!canAnswer) return;
                    canAnswer = false;
                    if (ans === correct) {
                        correctCount++; score = (correctCount * 0.5).toFixed(1);
                        btn.classList.add('correct-ans');
                        document.getElementById('feedback-icon').innerHTML = "😊";
                        try { document.getElementById('correctSound').play(); } catch(e){}
                        setTimeout(() => next(), 800);
                    } else {
                        btn.classList.add('wrong-ans');
                        document.getElementById('feedback-icon').innerHTML = "😢";
                        try { document.getElementById('wrongSound').play(); } catch(e){}
                        setTimeout(() => next(), 2000);
                    }
                    document.getElementById('feedback-icon').classList.add('show');
                    document.getElementById('currentScore').innerText = score;
                };
                grid.appendChild(btn);
            });
        }

        function next() {
            currentIndex++;
            if (currentIndex < 20) showQuestion(); else endGame();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const secs = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const name = document.getElementById('studentName').value.trim();
            document.getElementById('honoredName').innerText = "Học sinh: " + name;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('correctCount').innerText = correctCount;
            saveScore(name, score, totalSeconds);
        }

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }
        
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 20; i++) {
            const s = document.createElement('div');
            s.className = 'star'; s.innerHTML = '⭐';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(s);
        }
    </script>
</body>
</html>
