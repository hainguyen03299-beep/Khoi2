<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Toán - Phép Tính Đơn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            overflow-x: hidden;
            margin: 0;
            user-select: none;
        }

        .star {
            position: fixed;
            color: #fff;
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card-game {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #81c784;
            position: relative;
        }

        .btn-answer {
            transition: all 0.2s;
            border-bottom: 5px solid #e2e8f0;
        }
        
        .btn-answer:active:not(.disabled) {
            transform: translateY(4px);
            border-bottom: 0;
        }

        .correct-ans {
            background-color: #4ade80 !important;
            color: white !important;
            border-color: #22c55e !important;
            border-bottom-color: #16a34a !important;
        }

        .wrong-ans {
            background-color: #f87171 !important;
            color: white !important;
            border-color: #ef4444 !important;
            border-bottom-color: #dc2626 !important;
        }

        #feedback-icon {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 60px;
            z-index: 50;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #feedback-icon.show {
            transform: translate(-50%, -50%) scale(1.2);
        }

        .hidden { display: none; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="stars-container"></div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="correctSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="wrongSound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="max-w-xl w-full z-10">
        <div id="welcome-screen" class="card-game p-8 text-center">
            <h1 class="text-4xl font-bold text-green-700 mb-4">🌟 BÉ HỌC TOÁN 🌟</h1>
            <p class="text-lg text-gray-600 mb-6 font-semibold">Phép tính đơn: Cộng, Trừ, Nhân 2 & 5<br></p>
            
            <div class="mb-6">
                <input type="text" id="studentName" placeholder="Nhập tên của bé..." 
                    class="w-full p-4 rounded-2xl border-2 border-green-300 focus:outline-none focus:border-green-500 text-center text-xl">
            </div>

            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-lg transition btn-answer">
                BẮT ĐẦU CHƠI 🚀
            </button>
            <p class="mt-4 text-sm text-gray-500 italic">Chúc bé làm tốt nhé!</p>
        </div>

        <div id="game-screen" class="card-game p-6 hidden">
            <div id="feedback-icon"></div>
            <div class="flex justify-between items-center mb-6">
                <div class="bg-green-100 px-4 py-2 rounded-full font-bold text-green-700">Câu: <span id="currentQuestionNum">1</span>/20</div>
                <div class="bg-yellow-100 px-4 py-2 rounded-full font-bold text-yellow-700">⏱️ <span id="timer">00:00</span></div>
                <div class="bg-blue-100 px-4 py-2 rounded-full font-bold text-blue-700">Điểm: <span id="currentScore">0</span></div>
            </div>
            <div class="text-center mb-8">
                <div id="questionText" class="text-2xl md:text-3xl font-bold text-gray-800 bg-gray-50 p-6 md:p-8 rounded-3xl border-2 border-dashed border-green-200 min-h-[150px] flex items-center justify-center">
                </div>
            </div>
            <div id="answersGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="result-screen" class="card-game p-8 text-center hidden">
            <h2 class="text-4xl font-bold text-yellow-600 mb-2">HOÀN THÀNH! 🎉</h2>
            <div id="honoredName" class="text-2xl font-bold text-green-700 mb-6"></div>
            <div class="bg-yellow-50 rounded-3xl p-6 mb-6 border-2 border-yellow-200">
                <div class="text-6xl font-black text-red-500 mb-2"><span id="finalScore">0</span></div>
                <div class="text-gray-600 font-bold text-xl">Số câu đúng: <span id="correctCount">0</span>/20</div>
            </div>
            <p id="rankMessage" class="text-green-600 font-bold text-2xl italic mb-8"></p>
            <button onclick="window.location.reload()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg transition btn-answer">
                CHƠI LẠI 🔄
            </button>
        </div>
    </div>

    <script>
        function generate200SingleOpQuestions() {
            const db = { basic: [], word: [] };

            // 1. Phép tính đơn thuần (120 câu)
            // Cộng (30 câu)
            for (let i = 0; i < 30; i++) {
                let a = Math.floor(Math.random() * 80) + 1;
                let b = Math.floor(Math.random() * (100 - a)) + 1;
                db.basic.push({ q: `${a} + ${b} = ?`, a: [(a + b).toString(), (a + b + 2).toString(), (a + b - 1).toString(), (a + b + 5).toString()] });
            }
            // Trừ (30 câu)
            for (let i = 0; i < 30; i++) {
                let a = Math.floor(Math.random() * 90) + 10;
                let b = Math.floor(Math.random() * a) + 1;
                db.basic.push({ q: `${a} - ${b} = ?`, a: [(a - b).toString(), (a - b + 1).toString(), (a - b - 2).toString(), (a - b + 3).toString()] });
            }
            // Nhân 2 (30 câu)
            for (let i = 0; i < 30; i++) {
                let val = Math.floor(Math.random() * 10) + 1;
                let type = i % 2 === 0;
                let qText = type ? `2 × ${val} = ?` : `${val} × 2 = ?`;
                db.basic.push({ q: qText, a: [(2 * val).toString(), (2 * val + 2).toString(), (2 * val - 2).toString(), "15"] });
            }
            // Nhân 5 (30 câu)
            for (let i = 0; i < 30; i++) {
                let val = Math.floor(Math.random() * 10) + 1;
                let type = i % 2 === 0;
                let qText = type ? `5 × ${val} = ?` : `${val} × 5 = ?`;
                db.basic.push({ q: qText, a: [(5 * val).toString(), (5 * val + 5).toString(), (5 * val - 5).toString(), "20"] });
            }

            // 2. Bài toán lời văn đơn giản (80 câu - mỗi câu 1 phép tính)
            const names = ["Lan", "An", "Bình", "Hoa", "Minh", "Tuấn", "Linh", "Nam", "Mai", "Hùng"];
            const items = ["viên kẹo", "quyển vở", "viên bi", "bông hoa", "quả cam", "con tem"];
            
            for (let i = 0; i < 80; i++) {
                let n = names[i % names.length];
                let it = items[i % items.length];
                let type = i % 4;

                if (type === 0) { // Cộng đơn
                    let a = Math.floor(Math.random()*40)+10, b = Math.floor(Math.random()*30)+5;
                    db.word.push({ q: `${n} có ${a} ${it}, mẹ cho thêm ${b} ${it}. Hỏi ${n} có bao nhiêu ${it}?`, a: [(a+b).toString(), (a+b+2).toString(), (a+b-1).toString(), (a+b+5).toString()] });
                } else if (type === 1) { // Trừ đơn
                    let a = Math.floor(Math.random()*50)+40, b = Math.floor(Math.random()*30)+5;
                    db.word.push({ q: `${n} có ${a} ${it}, ${n} cho bạn ${b} ${it}. Hỏi ${n} còn lại mấy ${it}?`, a: [(a-b).toString(), (a-b+1).toString(), (a-b-2).toString(), (a-b+5).toString()] });
                } else if (type === 2) { // Nhân 2 đơn
                    let a = Math.floor(Math.random()*9)+2;
                    db.word.push({ q: `Có ${a} bạn, mỗi bạn có 2 ${it}. Hỏi tất cả có bao nhiêu ${it}?`, a: [(a*2).toString(), (a*2+2).toString(), (a*2-1).toString(), "10"] });
                } else { // Nhân 5 đơn
                    let a = Math.floor(Math.random()*8)+2;
                    db.word.push({ q: `Có ${a} hộp, mỗi hộp có 5 ${it}. Hỏi tất cả có bao nhiêu ${it}?`, a: [(a*5).toString(), (a*5+5).toString(), (a*5-5).toString(), "25"] });
                }
            }
            return db;
        }

        const KHO_DE = generate200SingleOpQuestions();
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let correctCount = 0;
        let timerInterval;
        let totalSeconds = 0;
        let canAnswer = true;

        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.className = 'star'; star.innerHTML = '⭐';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.animationDuration = (Math.random() * 3 + 3) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function startGame() {
            const name = document.getElementById('studentName').value.trim();
            if (!name) return;
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // Mix 20 questions
            let q1 = shuffle([...KHO_DE.basic]).slice(0, 12);
            let q2 = shuffle([...KHO_DE.word]).slice(0, 8);
            currentQuestions = shuffle([...q1, ...q2]);
            
            startTimer();
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            document.getElementById('feedback-icon').classList.remove('show');
            const qData = currentQuestions[currentIndex];
            document.getElementById('currentQuestionNum').innerText = currentIndex + 1;
            document.getElementById('questionText').innerText = qData.q;
            
            const answersGrid = document.getElementById('answersGrid');
            answersGrid.innerHTML = '';
            const correct = qData.a[0];
            shuffle([...qData.a]).forEach(ans => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-green-700 font-bold py-4 px-6 rounded-2xl text-xl shadow border-2 border-green-200 btn-answer";
                btn.innerText = ans;
                btn.onclick = () => {
                    if (!canAnswer) return;
                    canAnswer = false;
                    if (ans === correct) {
                        correctCount++; score = (correctCount * 0.5).toFixed(1);
                        btn.classList.add('correct-ans');
                        document.getElementById('feedback-icon').innerHTML = "😊";
                        document.getElementById('correctSound').play();
                        setTimeout(() => next(), 800);
                    } else {
                        btn.classList.add('wrong-ans');
                        document.getElementById('feedback-icon').innerHTML = "😢";
                        document.getElementById('wrongSound').play();
                        setTimeout(() => next(), 2500);
                    }
                    document.getElementById('feedback-icon').classList.add('show');
                    document.getElementById('currentScore').innerText = score;
                };
                answersGrid.appendChild(btn);
            });
        }

        function next() {
            currentIndex++;
            if (currentIndex < 20) showQuestion(); else endGame();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                totalSeconds++;
                const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const secs = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('honoredName').innerText = "Học sinh: " + document.getElementById('studentName').value;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('correctCount').innerText = correctCount;
            let msg = score >= 9 ? "Xuất sắc! Bé là thiên tài toán học! 🏆" : score >= 7 ? "Giỏi lắm! Phát huy bé nhé! 🌟" : "Bé hãy cố gắng luyện tập thêm nhé! ❤️";
            document.getElementById('rankMessage').innerText = msg;
        }

        window.onload = createStars;
    </script>
</body>
</html>
